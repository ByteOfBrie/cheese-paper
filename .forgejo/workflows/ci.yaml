name: Rust build/publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x86_64
            name: linux-x86_64
            archive_name: cheese-paper
          - os: windows-x86_64
            name: windows.exe
            archive_name: cheese-paper.exe
          - os: macos-arm64
            name: macos.app
            archive_name: bundle/osx/cheese-paper.app

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --release
    - name: Run tests
      run: cargo test --release
    - name: Create app bundle
      if: runner.os == 'macOS'
      shell: bash
      run: |
        cargo install bundle
        export PATH=$PATH:/Users/runner/.cargo/bin
        cargo bundle --release
    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: cheese-paper-${{ matrix.name }}
        path: target/release/${{ matrix.archive_name }}
