[package]
name = "cheese-paper"
version = "0.1.0"
edition = "2024"
description = "Organized writing tool with easy syncing and a simple file format"
repository = "https://codeberg.org/ByteOfBrie/cheese-paper"
license = "GPL-3.0-or-later"

# from `cargo msrv find`
rust-version = "1.91.1"

categories = ["text-editors", "filesystem"]

[package.metadata.bundle]
identifier = "gay.brie.cheese-paper"
category = "Productivity"
icon = ["resources/cheese-paper-icon.png"]

[profile.release]
lto = "fat"

[features]
metrics = []

[dependencies]
# file components
serde = { version = "1.0", features=["derive"]}
serde_json = "1.0"
toml = "0.9"
toml_edit = "0.23"
regex = "1.11.1"
uuid = { version = "1.17.0", features = ["v4"] }
log = "0.4.27"
tempfile = "3.20.0"
bitflags = "2.9.1"
semver = "1.0.27"

# ui
egui = "0.32"
eframe = { version = "0.32", features = [
    "persistence",   # Enable restoring app state when restarting the app.
] }

env_logger = { version = "0.11", default-features = false, features = [
    "auto-color",
    "humantime",
] }

egui_ltreeview = { version = "0.5.3", features = ["persistence"] }
egui_dock = "0.17"
directories = "6"
rfd = "0.15.4"
spellbook = "0.3.4"
notify = "8.1.0"
notify-debouncer-full = "0.6.0"
cow-utils = "0.1.3"
git2 = { version = "0.20.2", features = ["vendored-libgit2"] }
icu_casemap = "2.0.0"
rand = "0.9.2"
ureq = "3.2.0"
